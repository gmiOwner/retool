  query: |-
    function performOCR(input) {

      let imageSource;

      if (input.startsWith('http://') || input.startsWith('https://') || input.startsWith('gs://')) {
        imageSource = { source: { imageUri: input } };
      } else {
        const base64Data = input.replace(/^data:image\/\w+;base64,/, '');
        imageSource = { content: base64Data };
      }
      return imageSource;
    }

    const result = performOCR(getDocument.data.url)

    return result;
